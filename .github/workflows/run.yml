name: A股选股系统

on:
  schedule:
    - cron: "1 7 * * 1-5"   # 北京时间15:01
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main
        run: |
          echo "开始执行 main.py"
          python main.py || true
          echo "执行结束"

        env:
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
