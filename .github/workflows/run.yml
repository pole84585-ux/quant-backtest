name: A股量化系统

on:
  schedule:
    - cron: '1 7 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run
        run: python main.py
        env:
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
