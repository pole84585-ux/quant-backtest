name: A股终极量化系统

on:
  schedule:
    - cron: "1 7 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        run: python main.py
