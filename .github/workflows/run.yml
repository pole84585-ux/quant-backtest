name: A股选股系统

on:
  schedule:
    - cron: "1 7 * * 1-5"   # 🇨🇳 北京时间 15:01
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: Run
        run: python main.py
        env:
          PUSH_KEY: ${{ secrets.PUSH_KEY }}
