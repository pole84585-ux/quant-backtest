name: A股选股定时任务

on:
  schedule:
    - cron: '0 8 * * 1-5'   # 北京时间16:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TG diagnose / main
        run: python tg_diagnose.py
